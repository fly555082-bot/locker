<title>사물함 관리 시스템</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#F0EEE8;color:#1a1a1a;min-height:100vh;font-size:14px}

.header{background:#1B3252;color:#fff;padding:0 28px;display:flex;align-items:stretch;min-height:56px}
.header-title{display:flex;flex-direction:column;justify-content:center;padding:14px 0;flex:1}
.header-title h1{font-size:18px;font-weight:600;letter-spacing:-0.3px}
.header-title small{font-size:12px;opacity:.5;margin-top:2px}
.header-tabs{display:flex;align-items:flex-end;gap:2px}
.htab{padding:10px 20px;background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.6);cursor:pointer;font-size:13px;border-radius:8px 8px 0 0;transition:all .15s}
.htab.active{background:#F0EEE8;color:#1B3252;font-weight:600}
.header-right{display:flex;align-items:center;padding:0 0 0 20px;gap:10px}
.today-txt{font-size:12px;opacity:.5}
.hbtn{padding:7px 16px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:7px;font-size:12px;cursor:pointer}
.hbtn:hover{background:rgba(255,255,255,.2)}

.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:16px 24px 0}
.sc{background:#fff;border-radius:10px;padding:14px 18px;border:.5px solid #ddd9d0}
.sc-label{font-size:11px;color:#999;margin-bottom:5px}
.sc-val{font-size:24px;font-weight:700}
.sc-sub{font-size:11px;color:#bbb;margin-top:2px}
.sc-total .sc-val{color:#1B3252}.sc-used .sc-val{color:#2563EB}.sc-empty .sc-val{color:#16A34A}.sc-warn .sc-val{color:#D97706}.sc-exp .sc-val{color:#DC2626}

.toolbar{display:flex;gap:8px;padding:14px 24px;align-items:center;flex-wrap:wrap}
.toolbar input{padding:8px 13px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fff;outline:none;width:200px}
.toolbar input:focus{border-color:#1B3252}
.fbtn{padding:7px 14px;border-radius:7px;border:1px solid #ddd;background:#fff;font-size:12px;cursor:pointer;transition:all .12s;white-space:nowrap}
.fbtn.active{background:#1B3252;color:#fff;border-color:#1B3252}
.ml{margin-left:auto}
.add-btn{padding:8px 18px;background:#1B3252;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer}

.legend{display:flex;gap:14px;padding:0 24px 12px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:5px;font-size:12px;color:#777}
.ld{width:11px;height:11px;border-radius:3px}
.ld-e{background:#A7F3C0}.ld-u{background:#BFDBFE}.ld-w{background:#FCD34D}.ld-x{background:#FECACA}

.floors-wrap{padding:0 24px 30px;display:flex;flex-direction:column;gap:20px}
.floor-block{background:#fff;border-radius:14px;border:.5px solid #ddd9d0;overflow:hidden}
.floor-header{background:#1B3252;color:#fff;padding:12px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.floor-header h2{font-size:14px;font-weight:600}
.floor-badge{font-size:11px;background:rgba(255,255,255,.15);padding:3px 10px;border-radius:20px}
.floor-body{padding:18px 20px}
.zone-label{font-size:11px;font-weight:600;color:#999;letter-spacing:.8px;margin-bottom:8px;margin-top:16px;text-transform:uppercase}
.zone-label:first-child{margin-top:0}
.locker-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:4px}

.lc{width:76px;height:76px;border-radius:10px;border:1.5px solid transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .12s,box-shadow .12s;position:relative;user-select:none}
.lc:hover{transform:scale(1.06);box-shadow:0 4px 14px rgba(0,0,0,.1)}
.lc-num{font-size:15px;font-weight:700}
.lc-name{font-size:10px;margin-top:2px;max-width:68px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.lc-day{font-size:10px;margin-top:1px;font-weight:600}
.lc-sz{position:absolute;top:4px;right:5px;font-size:9px;font-weight:600;opacity:.65}

.s-empty{background:#EDFAF0;border-color:#A7F3C0}.s-empty .lc-num{color:#16A34A}.s-empty .lc-name{color:#4CAF50}
.s-used{background:#EFF4FF;border-color:#BFDBFE}.s-used .lc-num{color:#1D4ED8}.s-used .lc-name{color:#374151}.s-used .lc-day{color:#6B7280}
.s-warn{background:#FFFBEB;border-color:#FCD34D}.s-warn .lc-num{color:#92400E}.s-warn .lc-name{color:#374151}.s-warn .lc-day{color:#D97706}
.s-exp{background:#FFF1F0;border-color:#FECACA}.s-exp .lc-num{color:#B91C1C}.s-exp .lc-name{color:#374151}.s-exp .lc-day{color:#DC2626}

.list-wrap{padding:0 24px 30px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;border:.5px solid #ddd9d0}
thead{background:#F8F7F3}
th{text-align:left;padding:11px 14px;font-size:11px;color:#888;font-weight:600;letter-spacing:.5px}
td{padding:10px 14px;font-size:13px;border-top:.5px solid #F0EDE6}
tr:hover td{background:#FAFAF7}
.sb{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.sb-e{background:#EDFAF0;color:#16A34A}.sb-u{background:#EFF4FF;color:#1D4ED8}.sb-w{background:#FFFBEB;color:#92400E}.sb-x{background:#FFF1F0;color:#B91C1C}
.al{color:#1B3252;cursor:pointer;text-decoration:underline;font-size:12px}

.check-wrap{padding:0 24px 30px}
.check-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.check-header h3{font-size:16px;font-weight:600;color:#1B3252}
.check-sub{font-size:13px;color:#888}
.check-table{background:#fff;border-radius:12px;border:.5px solid #ddd9d0;overflow:hidden}
.ct-head{display:grid;grid-template-columns:90px 1fr 80px 100px 110px 1fr 90px;padding:10px 16px;background:#F8F7F3;font-size:11px;color:#888;font-weight:600;gap:8px}
.ct-row{display:grid;grid-template-columns:90px 1fr 80px 100px 110px 1fr 90px;padding:11px 16px;border-top:.5px solid #F0EDE6;gap:8px;align-items:center}
.ct-row:hover{background:#FAFAF7}
.expired-row{background:#FFF8F8}.warn-row{background:#FFFDF0}
.dday-exp{color:#DC2626;font-weight:600}.dday-warn{color:#D97706;font-weight:600}
.chk-cell{display:flex;gap:5px;flex-wrap:wrap}
.chk{display:inline-flex;align-items:center;gap:4px;font-size:11px;cursor:pointer;padding:3px 8px;border-radius:6px;border:1px solid #e0ddd6;background:#f9f8f5;user-select:none;transition:all .12s}
.chk.done{background:#EDFAF0;border-color:#A7F3C0;color:#16A34A;text-decoration:line-through}
.chk-box{width:12px;height:12px;border-radius:3px;border:1.5px solid #ccc;flex-shrink:0}
.chk.done .chk-box{background:#16A34A;border-color:#16A34A}
.sm-btn{padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid #ddd}

.mo{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.md{background:#fff;border-radius:16px;width:480px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.md-head{background:#1B3252;color:#fff;padding:20px 24px 16px;border-radius:16px 16px 0 0;position:sticky;top:0}
.md-head h2{font-size:17px;font-weight:600}
.md-head .md-sub{font-size:12px;opacity:.5;margin-top:3px}
.md-body{padding:20px 24px}
.fg{margin-bottom:14px}
label{display:block;font-size:12px;color:#666;margin-bottom:5px;font-weight:500}
input[type=text],input[type=date],input[type=tel],select,textarea{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;font-family:inherit;background:#fff}
input:focus,select:focus,textarea:focus{border-color:#1B3252}
textarea{resize:vertical;min-height:60px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sec-title{font-size:11px;font-weight:600;color:#1B3252;letter-spacing:.8px;text-transform:uppercase;margin:18px 0 10px;padding-bottom:6px;border-bottom:1.5px solid #E8E5DE}
.info-box{background:#F0F4FA;border-radius:10px;padding:13px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.info-box .num{font-size:19px;font-weight:700;color:#1B3252}
.info-box .meta{font-size:12px;color:#888;margin-top:2px}
.md-footer{padding:16px 24px;border-top:.5px solid #eee;display:flex;gap:8px;position:sticky;bottom:0;background:#fff;border-radius:0 0 16px 16px}
.btn-p{flex:1;padding:10px;background:#1B3252;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer}
.btn-s{padding:10px 16px;background:#fff;color:#555;border:1px solid #ddd;border-radius:8px;font-size:14px;cursor:pointer}
.btn-d{padding:10px 16px;background:#FFF1F0;color:#B91C1C;border:1px solid #FECACA;border-radius:8px;font-size:14px;cursor:pointer}
.btn-r{width:100%;padding:9px;background:#EFF4FF;color:#1D4ED8;border:1px solid #BFDBFE;border-radius:8px;font-size:13px;cursor:pointer;margin-bottom:8px}

@media print{
  body{background:#fff}
  .no-print{display:none!important}
  .floors-wrap{padding:0}
  .floor-block{border:1px solid #ccc;page-break-inside:avoid;margin-bottom:16px}
  .floor-header{background:#1B3252!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .s-empty,.s-used,.s-warn,.s-exp{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .s-empty{background:#EDFAF0!important}.s-used{background:#EFF4FF!important}.s-warn{background:#FFFBEB!important}.s-exp{background:#FFF1F0!important}
  .stats{display:none}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">
    <h1>사물함 관리 시스템</h1>

  </div>
  <div class="header-tabs">
    <button class="htab active" onclick="showTab('floor')">층별 배치</button>
    <button class="htab" onclick="showTab('list')">전체 목록</button>
    <button class="htab" onclick="showTab('check')">만료 체크리스트</button>
  </div>
  <div class="header-right no-print">

    <span id="saveStatus" style="font-size:11px;opacity:.4;margin-right:4px;transition:all .3s"></span>
    <button class="hbtn" style="background:#2563EB;border-color:#2563EB;font-weight:600;font-size:13px;padding:8px 20px" onclick="manualSave()">💾 저장</button>
    <button class="hbtn" onclick="exportCSV()">엑셀 내보내기</button>
    <button class="hbtn" onclick="loadFromSheet()" title="구글 시트에서 최신 데이터 불러오기">🔄 새로고침</button>
    <button class="hbtn" onclick="setScriptUrl()" title="구글 시트 URL 설정">⚙️ 설정</button>

  </div>
</div>

<div class="stats no-print" id="statsBar"></div>

<div class="toolbar no-print">
  <input type="text" id="searchInput" placeholder="이름, 번호, 연락처 검색..." oninput="renderAll()">

  <button class="fbtn" onclick="setFilter('3f',this)">3층</button>
  <button class="fbtn" onclick="setFilter('small',this)">소형</button>
  <button class="fbtn" onclick="setFilter('large',this)">대형</button>
  <button class="fbtn" onclick="setFilter('empty',this)">공실</button>
  <button class="fbtn" onclick="setFilter('warn',this)">만료임박</button>
  <button class="fbtn" onclick="setFilter('expired',this)">만료</button>
  <div class="ml"></div>
  <button class="add-btn no-print" onclick="openAddModal()">+ 공실 배정</button>
</div>

<div class="legend no-print">
  <div class="li"><div class="ld ld-e"></div>공실</div>
  <div class="li"><div class="ld ld-u"></div>사용중</div>
  <div class="li"><div class="ld ld-w"></div>만료임박 (14일 이내)</div>
  <div class="li"><div class="ld ld-x"></div>만료</div>
</div>

<div id="tabFloor"></div>

<div id="tabCheck" style="display:none"></div>

<script>
// ╔══════════════════════════════════════════════════════════╗
// ║  배치 설정 — 사물함 구조가 바뀌면 여기만 수정하세요     ║
// ╚══════════════════════════════════════════════════════════╝
const FLOOR_CONFIG = [
  {
    floorId: '2f', floorLabel: '2층',
    zones: [
      { zoneId: '2s', label: '소형', size: 'small', count: 50 }
    ]
  },
  {
    floorId: '3f', floorLabel: '3층',
    zones: [
      { zoneId: '3s', label: '소형', size: 'small', count: 80 },
      { zoneId: '3l', label: '대형', size: 'large', count: 36 }
    ]
  }
];
// ── 사물함이 추가되면 count 숫자만 바꾸면 됩니다 ──────────

// ── 날짜 유틸 ───────────────────────────────────────────────
const today = new Date(new Date().toLocaleString('en-US', {timeZone: 'Asia/Seoul'})); today.setHours(0,0,0,0);
function todayStr(){ const d=today; return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function mkDate(n){ const d=new Date(today); d.setDate(d.getDate()+n); return d.toISOString().split('T')[0]; }
function fmtDate(s){ if(!s) return ''; const d=new Date(s); return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`; }
function daysLeft(s){ if(!s) return null; const e=new Date(s); e.setHours(0,0,0,0); return Math.floor((e-today)/86400000); }
function getStatus(l){ if(!l.name) return 'empty'; const d=daysLeft(l.endDate); if(d<0) return 'expired'; if(d<=14) return 'warn'; return 'used'; }

//  로컬 저장 (브라우저 자동저장)
// ══════════════════════════════════════════════════════════
const STORAGE_KEY = 'locker_data_v2'; // v2 = 엑셀 데이터 기반

function setScriptUrl(){
  const current = localStorage.getItem('locker_script_url_v2') || '';
  const url = prompt('Google Apps Script 배포 URL을 입력하세요:', current);
  if(url === null) return;
  if(url.trim()){
    localStorage.setItem('locker_script_url_v2', url.trim());
    SCRIPT_URL = url.trim();
    alert('URL이 저장되었습니다!\n데이터를 구글 시트에서 불러옵니다...');
    loadFromSheet();
  } else {
    alert('URL을 입력하지 않았습니다.');
  }
}

function manualSave(){
  saveToStorage();
  const btn = document.querySelector('button[onclick="manualSave()"]');
  if(btn){ const orig=btn.textContent; btn.textContent='✓ 저장됨'; btn.style.background='#16A34A'; btn.style.borderColor='#16A34A'; setTimeout(()=>{ btn.textContent=orig; btn.style.background='#2563EB'; btn.style.borderColor='#2563EB'; },2000); }
}

function showSaveStatus(){
  const el=document.getElementById('saveStatus');
  if(!el)return;
  const now=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  el.textContent=`자동저장됨 ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  el.style.opacity='.6';
  setTimeout(()=>{el.style.opacity='.35';},3000);
}

function saveToStorage(){
  const data = {};
  Object.values(lockers).forEach(l => {
    if(l.name||l.checks&&Object.keys(l.checks).length){
      data[l.id] = { name:l.name, phone:l.phone, addr:l.addr, startDate:l.startDate, endDate:l.endDate, period:l.period, memo:l.memo, checks:l.checks };
    }
  });
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); showSaveStatus(); } catch(e){}
}

function loadFromStorage(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const data = JSON.parse(raw);
    Object.entries(data).forEach(([id, d]) => {
      if(lockers[id]){ Object.assign(lockers[id], d); }
    });
  } catch(e){}
}

function exportBackup(){
  const data = {};
  Object.values(lockers).forEach(l => {
    data[l.id] = { name:l.name, phone:l.phone, addr:l.addr, startDate:l.startDate, endDate:l.endDate, period:l.period, memo:l.memo, checks:l.checks };
  });
  const json = JSON.stringify({version:1, savedAt:new Date().toISOString(), data}, null, 2);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([json], {type:'application/json'}));
  a.download = `사물함백업_${todayStr()}.json`;
  a.click();
}

function importBackup(){
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        const data = parsed.data || parsed;
        let count = 0;
        Object.entries(data).forEach(([id, d]) => {
          if(lockers[id]){ Object.assign(lockers[id], d); count++; }
        });
        saveToStorage();
        renderAll();
        alert(`백업 파일을 불러왔습니다. (${count}개 사물함 복원)`);
      } catch(err){ alert('파일을 읽을 수 없습니다. 올바른 백업 파일인지 확인해 주세요.'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function resetData(){
  if(!confirm('모든 데이터를 초기화하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) return;
  Object.values(lockers).forEach(l=>{ l.name='';l.phone='';l.addr='';l.startDate='';l.endDate='';l.period='';l.memo='';l.checks={}; });
  localStorage.removeItem(STORAGE_KEY);
  renderAll();
}

// ── 상태 ────────────────────────────────────────────────────
let currentTab='floor', currentFilter='all';
function allLocks(){ return Object.values(lockers); }
function filtered(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  return allLocks().filter(l=>{
    const st=getStatus(l);
    const mf=currentFilter==='all'?true:currentFilter==='2f'?l.floorId==='2f':currentFilter==='3f'?l.floorId==='3f':currentFilter==='small'?l.size==='small':currentFilter==='large'?l.size==='large':currentFilter==='empty'?st==='empty':currentFilter==='warn'?(st==='warn'||st==='expired'):currentFilter==='expired'?st==='expired':true;
    const ms=!q||String(l.num).includes(q)||l.name.toLowerCase().includes(q)||l.phone.includes(q)||l.addr.toLowerCase().includes(q);
    return mf&&ms;
  });
}
function showTab(t){
  currentTab=t;
  ['floor','list','check'].forEach((n,i)=>{ document.querySelectorAll('.htab')[i].classList.toggle('active',n===t); document.getElementById('tab'+n.charAt(0).toUpperCase()+n.slice(1)).style.display=n===t?'':'none'; });
  renderAll();
}
function setFilter(f,btn){ currentFilter=f; document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderAll(); }

// ── 렌더 ────────────────────────────────────────────────────
function renderAll(){ renderStats(); if(currentTab==='floor')renderFloor(); else if(currentTab==='list')renderList(); else renderCheck(); }

function renderStats(){
  const ls=allLocks(), used=ls.filter(l=>l.name).length, empty=ls.length-used;
  const warn=ls.filter(l=>getStatus(l)==='warn').length, exp=ls.filter(l=>getStatus(l)==='expired').length;
  const total2=FLOOR_CONFIG[0].zones.reduce((s,z)=>s+z.count,0);
  const total3=FLOOR_CONFIG[1].zones.reduce((s,z)=>s+z.count,0);
  document.getElementById('statsBar').innerHTML=`
    <div class="sc sc-total"><div class="sc-label">전체 사물함</div><div class="sc-val">${ls.length}</div><div class="sc-sub">2층 ${total2}개 · 3층 ${total3}개</div></div>
    <div class="sc sc-used"><div class="sc-label">사용중</div><div class="sc-val">${used}</div><div class="sc-sub">점유율 ${Math.round(used/ls.length*100)}%</div></div>
    <div class="sc sc-empty"><div class="sc-label">공실</div><div class="sc-val">${empty}</div><div class="sc-sub">배정 가능</div></div>
    <div class="sc sc-warn"><div class="sc-label">만료임박</div><div class="sc-val">${warn}</div><div class="sc-sub">14일 이내</div></div>
    <div class="sc sc-exp"><div class="sc-label">만료</div><div class="sc-val">${exp}</div><div class="sc-sub">조치 필요</div></div>`;
}

function renderFloor(){
  const vis=new Set(filtered().map(l=>l.id));
  let html='<div class="floors-wrap">';
  FLOOR_CONFIG.forEach(fl=>{
    if(currentFilter==='2f'&&fl.floorId!=='2f')return;
    if(currentFilter==='3f'&&fl.floorId!=='3f')return;
    const fls=allLocks().filter(l=>l.floorId===fl.floorId);
    const used=fls.filter(l=>l.name).length;
    html+=`<div class="floor-block"><div class="floor-header"><h2>${fl.floorLabel}</h2><span class="floor-badge">전체 ${fls.length}개</span><span class="floor-badge">사용 ${used}개</span><span class="floor-badge">공실 ${fls.length-used}개</span></div><div class="floor-body">`;
    fl.zones.forEach(z=>{
      if(currentFilter==='small'&&z.size!=='small')return;
      if(currentFilter==='large'&&z.size!=='large')return;
      const zls=allLocks().filter(l=>l.zoneId===z.zoneId&&vis.has(l.id));
      if(!zls.length)return;
      html+=`<div class="zone-label">${z.label} (1 ~ ${z.count}번)</div><div class="locker-grid">${zls.map(lockerCell).join('')}</div>`;
    });
    html+='</div></div>';
  });
  if(!filtered().length)html+='<div style="padding:60px;text-align:center;color:#aaa;background:#fff;border-radius:12px;margin:0 24px">검색 결과가 없습니다.</div>';
  html+='</div>';
  document.getElementById('tabFloor').innerHTML=html;
}

function lockerCell(l){
  const st=getStatus(l),dl=daysLeft(l.endDate);
  const cls={empty:'s-empty',used:'s-used',warn:'s-warn',expired:'s-exp'}[st];
  const dstr=st==='warn'?`D-${dl}`:st==='expired'?`D+${Math.abs(dl)}`:'';
  return `<div class="lc ${cls}" onclick="openModal('${l.id}')" title="${l.name||'공실'} ${l.phone}"><div class="lc-sz">${l.size==='small'?'소':'대'}</div><div class="lc-num">${l.num}</div><div class="lc-name">${l.name||'공실'}</div>${dstr?`<div class="lc-day">${dstr}</div>`:''}</div>`;
}

function renderList(){
  const fl=filtered();
  const stLbl={empty:'공실',used:'사용중',warn:'만료임박',expired:'만료'};
  const sbCls={empty:'sb-e',used:'sb-u',warn:'sb-w',expired:'sb-x'};
  const rows=fl.map(l=>{
    const st=getStatus(l),dl=daysLeft(l.endDate);
    const dstr=st==='warn'?`D-${dl}`:st==='expired'?`만료 ${Math.abs(dl)}일`:dl!==null?`${dl}일 남음`:'-';
    const dc=st==='expired'?'#DC2626':st==='warn'?'#D97706':'#888';
    return `<tr><td>${l.floorLabel}</td><td>${l.zoneLabel} <b>${l.num}번</b></td><td>${l.size==='small'?'소형':'대형'}</td><td>${l.name||'-'}</td><td>${l.phone||'-'}</td><td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.addr||'-'}</td><td>${fmtDate(l.startDate)||'-'}</td><td>${fmtDate(l.endDate)||'-'}</td><td>${l.period?l.period+'개월':'-'}</td><td style="color:${dc};font-weight:${st==='warn'||st==='expired'?'600':'400'}">${dstr}</td><td><span class="sb ${sbCls[st]}">${stLbl[st]}</span></td><td><span class="al" onclick="openModal('${l.id}')">관리</span></td></tr>`;
  }).join('');
  document.getElementById('tabList').innerHTML=`<div class="list-wrap"><table><thead><tr><th>층</th><th>번호</th><th>크기</th><th>사용자</th><th>연락처</th><th>주소</th><th>시작일</th><th>만료일</th><th>기간</th><th>D-Day</th><th>상태</th><th></th></tr></thead><tbody>${rows||'<tr><td colspan="12" style="text-align:center;padding:40px;color:#aaa">검색 결과 없음</td></tr>'}</tbody></table></div>`;
}

const CHECK_ITEMS=['연락 완료','갱신 의사 확인','납부 확인','반납/갱신 처리'];
function renderCheck(){
  const warn=allLocks().filter(l=>{const s=getStatus(l);return s==='warn'||s==='expired';}).sort((a,b)=>daysLeft(a.endDate)-daysLeft(b.endDate));
  if(!warn.length){document.getElementById('tabCheck').innerHTML='<div class="check-wrap"><div style="text-align:center;padding:60px;background:#fff;border-radius:12px;color:#aaa">만료임박 또는 만료된 사물함이 없습니다.</div></div>';return;}
  const done=warn.filter(l=>CHECK_ITEMS.every((_,i)=>l.checks[`${l.id}_${i}`])).length;
  const rows=warn.map(l=>{
    const st=getStatus(l),dl=daysLeft(l.endDate);
    const allDone=CHECK_ITEMS.every((_,i)=>l.checks[`${l.id}_${i}`]);
    const chks=CHECK_ITEMS.map((c,i)=>{const k=`${l.id}_${i}`,dn=l.checks[k];return `<span class="chk${dn?' done':''}" onclick="toggleCheck('${l.id}',${i},'${k}')"><span class="chk-box"></span>${c}</span>`;}).join('');
    return `<div class="ct-row ${st==='expired'?'expired-row':'warn-row'}" style="${allDone?'opacity:.4':''}">
      <div><b>${l.floorLabel} ${l.zoneLabel} ${l.num}번</b></div>
      <div><b>${l.name}</b><br><span style="font-size:11px;color:#aaa">${l.addr||''}</span></div>
      <div class="${st==='expired'?'dday-exp':'dday-warn'}">${st==='expired'?`만료 ${Math.abs(dl)}일`:`D-${dl}`}</div>
      <div>${fmtDate(l.endDate)}</div>
      <div style="font-size:12px">${l.phone||'-'}</div>
      <div><div class="chk-cell">${chks}</div></div>
      <div style="display:flex;flex-direction:column;gap:4px">
        <button class="sm-btn" style="background:#FFFBEB;color:#92400E;border-color:#FCD34D" onclick="quickRenew('${l.id}')">갱신</button>
        <button class="sm-btn" style="background:#FFF1F0;color:#B91C1C;border-color:#FECACA" onclick="returnLocker('${l.id}')">반납</button>
        <button class="sm-btn" style="background:#EFF4FF;color:#1D4ED8;border-color:#BFDBFE" onclick="openModal('${l.id}')">상세</button>
      </div>
    </div>`;
  }).join('');
  document.getElementById('tabCheck').innerHTML=`<div class="check-wrap"><div class="check-header"><h3>만료 체크리스트</h3><div class="check-sub">${warn.length}건 중 <b>${done}</b>건 처리 완료</div></div><div class="check-table"><div class="ct-head"><div>사물함</div><div>사용자</div><div>D-Day</div><div>만료일</div><div>연락처</div><div>처리 항목</div><div>조치</div></div>${rows}</div></div>`;
}
function toggleCheck(id,idx,key){ lockers[id].checks[key]=!lockers[id].checks[key]; renderCheck(); }

// ── 모달 ────────────────────────────────────────────────────
function openModal(id){
  const l=lockers[id],st=getStatus(l),isUsed=!!l.name,dl=daysLeft(l.endDate);
  const stLbl={empty:'공실',used:'사용중',warn:'만료임박',expired:'만료'};
  const sbCls={empty:'sb-e',used:'sb-u',warn:'sb-w',expired:'sb-x'};
  const dstr=st==='warn'?`만료까지 ${dl}일 남음`:st==='expired'?`만료 ${Math.abs(dl)}일 경과`:dl!==null?`만료까지 ${dl}일 남음`:'';
  const dc=st==='expired'?'#DC2626':st==='warn'?'#D97706':'#6B7280';
  const curPeriod = l.period || '3';
  const fields=`
    <div class="sec-title">기본 정보</div>
    <div class="fg"><label>사용자 이름${!isUsed?' <span style="color:#DC2626">*</span>':''}</label><input type="text" id="m_name" value="${l.name}" placeholder="이름"></div>
    <div class="fg"><label>연락처</label><input type="tel" id="m_phone" value="${l.phone}" placeholder="010-0000-0000"></div>
    <div class="fg"><label>주소</label><input type="text" id="m_addr" value="${l.addr||''}" placeholder="주소 (선택)"></div>

    <div class="sec-title">계약 기간</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      <button type="button" id="btn3" onclick="selectPeriod(3)"
        style="padding:14px;border-radius:10px;border:2px solid ${curPeriod==='3'?'#1B3252':'#ddd'};background:${curPeriod==='3'?'#EFF4FF':'#fff'};color:${curPeriod==='3'?'#1B3252':'#666'};font-size:15px;font-weight:${curPeriod==='3'?'700':'400'};cursor:pointer;transition:all .15s">
        3개월
      </button>
      <button type="button" id="btn6" onclick="selectPeriod(6)"
        style="padding:14px;border-radius:10px;border:2px solid ${curPeriod==='6'?'#1B3252':'#ddd'};background:${curPeriod==='6'?'#EFF4FF':'#fff'};color:${curPeriod==='6'?'#1B3252':'#666'};font-size:15px;font-weight:${curPeriod==='6'?'700':'400'};cursor:pointer;transition:all .15s">
        6개월
      </button>
    </div>
    <input type="hidden" id="m_period" value="${curPeriod}">

    <div style="background:#F8F7F3;border-radius:10px;padding:14px 16px;margin-bottom:14px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div>
          <div style="font-size:11px;color:#999;margin-bottom:5px;font-weight:500;display:flex;align-items:center;gap:6px">
            시작일
            ${!isUsed?`<span style="background:#D1FAE5;color:#065F46;font-size:10px;padding:1px 7px;border-radius:20px;font-weight:600">오늘 자동입력 · 수정 가능</span>`:''}
          </div>
          <input type="date" id="m_start" value="${l.startDate||todayStr()}" oninput="autoCalcEnd()" style="border:1px solid ${!isUsed?'#A7F3C0':'#ddd'};border-radius:8px;padding:8px 10px;font-size:13px;width:100%;background:${!isUsed?'#EDFAF0':'#fff'}" onfocus="this.style.borderColor='#1B3252';this.style.background='#fff'" onblur="autoCalcEnd()">
        </div>
        <div>
          <div style="font-size:11px;color:#999;margin-bottom:5px;font-weight:500">만료일 (자동 계산)</div>
          <input type="date" id="m_end" value="${l.endDate||''}" style="border:1px solid #ddd;border-radius:8px;padding:8px 10px;font-size:13px;width:100%;background:#fff">
        </div>
      </div>
      <div id="dday_display" style="margin-top:10px;font-size:13px;font-weight:600;color:#1B3252;text-align:center"></div>
    </div>
    ${dstr&&isUsed?`<div style="font-size:12px;color:${dc};font-weight:500;margin:-6px 0 14px;padding:6px 10px;background:${st==='expired'?'#FFF1F0':st==='warn'?'#FFFBEB':'#F0F4FA'};border-radius:6px">${dstr}</div>`:''}

    <div class="sec-title">추가 정보</div>
    <div class="fg"><label>메모 / 특이사항</label><textarea id="m_memo" placeholder="특이사항, 요청사항 등">${l.memo||''}</textarea></div>`;
  const body=isUsed
    ?`<div class="info-box"><div><div class="num">${l.floorLabel} · ${l.zoneLabel} ${l.num}번</div><div class="meta">${l.size==='small'?'소형':'대형'}</div></div><span class="sb ${sbCls[st]}">${stLbl[st]}</span></div>${fields}<button class="btn-r" onclick="renewModal('${id}')">갱신 처리 (만료일 연장)</button>`
    :`<div class="info-box"><div><div class="num">${l.floorLabel} · ${l.zoneLabel} ${l.num}번 — 공실</div><div class="meta">${l.size==='small'?'소형':'대형'}</div></div></div>${fields}`;
  const footer=isUsed
    ?`<button class="btn-d" onclick="returnLocker('${id}')">반납</button><div style="flex:1"></div><button class="btn-s" onclick="closeModal()">닫기</button><button class="btn-p" onclick="saveModal('${id}')">저장</button>`
    :`<button class="btn-s" onclick="closeModal()">취소</button><button class="btn-p" onclick="saveModal('${id}')">배정 완료</button>`;
  document.getElementById('modalWrap').innerHTML=`<div class="mo" onclick="if(event.target===this)closeModal()"><div class="md"><div class="md-head"><h2>사물함 관리</h2><div class="md-sub">${l.floorLabel} · ${l.zoneLabel} · ${l.num}번</div></div><div class="md-body">${body}</div><div class="md-footer">${footer}</div></div></div>`;
  setTimeout(autoCalcEnd,50);
}
function openAddModal(){ const e=allLocks().find(l=>!l.name); if(e)openModal(e.id); else alert('공실이 없습니다.'); }
function selectPeriod(months){
  document.getElementById('m_period').value=String(months);
  const b3=document.getElementById('btn3'),b6=document.getElementById('btn6');
  [b3,b6].forEach(b=>{ b.style.borderColor='#ddd';b.style.background='#fff';b.style.color='#666';b.style.fontWeight='400'; });
  const act=months===3?b3:b6;
  act.style.borderColor='#1B3252';act.style.background='#EFF4FF';act.style.color='#1B3252';act.style.fontWeight='700';
  autoCalcEnd();
}
function autoCalcEnd(){
  const s=document.getElementById('m_start'),p=document.getElementById('m_period'),e=document.getElementById('m_end'),dd=document.getElementById('dday_display');
  if(!s||!p||!e)return;
  const d=new Date(s.value); if(isNaN(d.getTime()))return;
  d.setMonth(d.getMonth()+parseInt(p.value)); e.value=d.toISOString().split('T')[0];
  if(dd){ const dl=daysLeft(e.value); dd.textContent=dl!==null?`${fmtDate(s.value)}  →  ${fmtDate(e.value)}  (${dl}일 후 만료)`:''; }
}
function saveModal(id){ const l=lockers[id],name=document.getElementById('m_name').value.trim(); if(!name){alert('이름을 입력해 주세요.');return;} l.name=name;l.phone=document.getElementById('m_phone').value.trim();l.addr=document.getElementById('m_addr').value.trim();l.startDate=document.getElementById('m_start').value;l.period=document.getElementById('m_period').value;l.endDate=document.getElementById('m_end').value;l.memo=document.getElementById('m_memo').value.trim(); saveToStorage();closeModal();renderAll(); }
function renewModal(id){ const l=lockers[id],p=document.getElementById('m_period'),months=parseInt(p?p.value:l.period||'3'),base=new Date(l.endDate||today); if(base<today)base.setTime(today.getTime()); base.setMonth(base.getMonth()+months); l.endDate=base.toISOString().split('T')[0];l.period=String(months); closeModal();renderAll();openModal(id); }
function quickRenew(id){ const l=lockers[id],months=parseInt(l.period||'3'),base=new Date(l.endDate||today); if(base<today)base.setTime(today.getTime()); base.setMonth(base.getMonth()+months); l.endDate=base.toISOString().split('T')[0]; saveToStorage();renderAll(); }
function returnLocker(id){ if(!confirm('반납 처리하시겠습니까?'))return; const l=lockers[id]; l.name='';l.phone='';l.addr='';l.startDate='';l.endDate='';l.period='';l.memo='';l.checks={}; saveToStorage();closeModal();renderAll(); }
function closeModal(){ document.getElementById('modalWrap').innerHTML=''; }

// ── 엑셀 내보내기 ────────────────────────────────────────────
function exportCSV(){
  const hdr=['층','구역','번호','크기','사용자','연락처','주소','시작일','만료일','계약기간','상태','메모'];
  const stLbl={empty:'공실',used:'사용중',warn:'만료임박',expired:'만료'};
  const rows=allLocks().map(l=>[l.floorLabel,l.zoneLabel,l.num,l.size==='small'?'소형':'대형',l.name||'',l.phone||'',l.addr||'',fmtDate(l.startDate),fmtDate(l.endDate),l.period?l.period+'개월':'',stLbl[getStatus(l)],l.memo||'']);
  const csv=[hdr,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'})); a.download=`사물함현황_${todayStr()}.csv`; a.click();
}

// ── 초기화 ───────────────────────────────────────────────────
loadFromStorage();
document.getElementById('todayTxt').textContent=today.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
renderAll();
</script>

  </div>
  <div style="display:flex;gap:8px">

    <button onclick="document.getElementById('pwa-install-bar').style.display='none'" style="padding:9px 14px;background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer">닫기</button>
  </div>
</div>

<script>
// Service Worker (inline)
const swCode = `
self.addEventListener('install', e => e.waitUntil(
  caches.open('locker-v1').then(c => c.addAll([location.pathname]))
));
self.addEventListener('fetch', e => e.respondWith(
  caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match(e.request)))
));
`;
const swBlob = new Blob([swCode], {type:'application/javascript'});
const swUrl = URL.createObjectURL(swBlob);

let deferredPrompt = null;

if('serviceWorker' in navigator){
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('pwa-install-bar').style.display = 'flex';
});

window.addEventListener('appinstalled', () => {
  document.getElementById('pwa-install-bar').style.display = 'none';
});

function installPWA(){
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(()=>{ deferredPrompt=null; document.getElementById('pwa-install-bar').style.display='none'; });
  } else {
    // iOS / manual guide
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    if(isIOS){
      alert('아이폰/아이패드에서 설치 방법:\n\n1. 하단 공유 버튼(□↑) 탭\n2. "홈 화면에 추가" 선택\n3. 추가 버튼 탭');
    } else {
      alert('설치 방법:\n\n크롬: 주소창 오른쪽 설치 아이콘 클릭\n또는 메뉴(⋮) → 앱 설치');
    }
  }
}
</script>
